<app-header title="Restablecer Contraseña"></app-header>

<ion-content>


<div class="d-flex-center">
    <form [formGroup]="form" class="auth-form" (ngSubmit)="submit()" (keypress.enter)="submit()">

        <img src="../../../assets/img/Registro.png" class="imgnt" alt="">

        <app-custom-input 
        autocomplete="email" 
        icon="person-outline"
        type="email"
        label="Nombre"></app-custom-input>  

        <app-custom-input 
        [control]="form.controls.password"
        icon="lock-closed-outline"
        type="password"
        label="Contraseña"></app-custom-input>

        
        <div class="validators" *ngIf="form.controls.password.errors && form.controls.password.touched">
            <div *ngIf="form.controls.password.errors?.['required']">La contraseña es requerida</div>
        </div>

        <ion-button class="ion-margin-top" routerLink="registro" routerLinkActive="router-link-active"  expand="block" mode="ios" fill="outline">
          Restablecer
          <ion-icon slot="end" name="log-in-outline"></ion-icon>
      </ion-button>
    </form>
</div>
